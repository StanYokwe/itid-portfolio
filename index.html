<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Isaac Wani portfolio — IT Innovation & Design graduate portfolio presented as an interactive console channel menu." />
  <title>Isaac Wani | IT Innovation & Design Portfolio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="custom-cursor" aria-hidden="true"></div>
  <div class="tap-ripple" aria-hidden="true"></div>

  <a class="skip-link" href="#channel-grid">Skip to projects</a>

  <main class="console" aria-label="Interactive portfolio menu">
    <section class="top-status" aria-label="Portfolio status bar">
      <div class="status-pill">
        <span class="signal-dot"></span>
        <strong>Portfolio Channel Menu</strong>
      </div>
      <div class="status-pill muted">Use mouse, arrow keys, or Enter</div>
    </section>

    <section class="channel-stage" aria-label="Portfolio channels">
      <button class="side-arrow left" type="button" aria-label="Previous page">‹</button>

      <div id="channel-grid" class="channel-grid" role="list">
        <button class="channel is-selected" type="button" role="listitem" data-channel="about">
          <span class="channel-screen about-screen">
            <span class="mii-face">
              <span class="mii-head"></span>
              <span class="mii-body"></span>
            </span>
            <span class="bubble-dots"></span>
          </span>
          <span class="channel-label">About Me</span>
        </button>

        <button class="channel" type="button" role="listitem" data-channel="featured">
          <span class="channel-screen star-screen">
            <span class="starburst">★</span>
            <span class="spark s1"></span><span class="spark s2"></span><span class="spark s3"></span>
          </span>
          <span class="channel-label">Featured Projects</span>
        </button>

        <button class="channel" type="button" role="listitem" data-channel="memory">
          <span class="channel-screen phone-screen purple">
            <span class="phone-shell">
              <span class="phone-top"></span>
              <span class="phone-list"><i></i><i></i><i></i><i></i></span>
            </span>
            <span class="plus-badge">+</span>
          </span>
          <span class="channel-label">Memory Log App</span>
        </button>

        <button class="channel" type="button" role="listitem" data-channel="workshop">
          <span class="channel-screen phone-screen green">
            <span class="mini-calendar">
              <span></span><span></span><span class="checked"></span><span></span><span class="checked"></span><span></span>
            </span>
            <span class="check-badge">✓</span>
          </span>
          <span class="channel-label">Workshop Registration App</span>
        </button>

        <button class="channel" type="button" role="listitem" data-channel="api">
          <span class="channel-screen api-screen">
            <span class="cloud-code">&lt;/&gt;</span>
            <span class="gear">⚙</span>
            <span class="db-stack"><i></i><i></i><i></i></span>
          </span>
          <span class="channel-label">Desired Marketplace API</span>
        </button>

        <button class="channel" type="button" role="listitem" data-channel="database">
          <span class="channel-screen webapp-screen">
            <span class="browser-window"><span></span><b></b><i></i><i></i><i></i></span>
            <span class="db-stack small"><i></i><i></i><i></i></span>
          </span>
          <span class="channel-label">Member Database Web App</span>
        </button>

        <button class="channel" type="button" role="listitem" data-channel="powerbi">
          <span class="channel-screen chart-screen">
            <span class="chart-line"></span>
            <span class="bars"><i></i><i></i><i></i><i></i></span>
            <span class="bi-badge">BI</span>
          </span>
          <span class="channel-label">Power BI Dashboard</span>
        </button>

        <button class="channel" type="button" role="listitem" data-channel="weather">
          <span class="channel-screen weather-screen">
            <span class="sun"></span>
            <span class="cloud"></span>
            <span class="rain"><i></i><i></i><i></i></span>
          </span>
          <span class="channel-label">Weather UX Case Study</span>
        </button>

        <button class="channel" type="button" role="listitem" data-channel="skills">
          <span class="channel-screen skills-screen">
            <span class="toolbox"><i>&lt;/&gt;</i><b></b><em></em></span>
          </span>
          <span class="channel-label">Skills</span>
        </button>

        <button class="channel" type="button" role="listitem" data-channel="resume">
          <span class="channel-screen resume-screen">
            <span class="paper"><i></i><i></i><i></i></span>
            <span class="download-dot">↓</span>
          </span>
          <span class="channel-label">Resume</span>
        </button>

        <button class="channel" type="button" role="listitem" data-channel="contact">
          <span class="channel-screen contact-screen">
            <span class="envelope"></span>
            <span class="at-badge">@</span>
          </span>
          <span class="channel-label">Contact</span>
        </button>

        <button class="channel ghost-channel" type="button" role="listitem" data-channel="coming-soon">
          <span class="channel-screen soon-screen">
            <span class="plus-ring">+</span>
          </span>
          <span class="channel-label">More Coming Soon</span>
        </button>
      </div>

      <button class="side-arrow right" type="button" aria-label="Next page">›</button>
    </section>

    <section class="console-footer" aria-label="Console footer">
      <div class="footer-left">
        <button class="round-button home-button" type="button" data-channel="about">PORT</button>
        <span class="sd-card">SD</span>
      </div>

      <div class="clock-panel">
        <div class="clock-row"><span id="clock">12:00</span><small id="ampm">AM</small></div>
        <div id="date" class="date-row">Fri 1/1</div>
      </div>

      <div class="footer-right">
        <button class="round-button mail-button" type="button" data-channel="contact" aria-label="Open contact channel">
          ✉ <span class="notification">1</span>
        </button>
      </div>
    </section>

    <section class="player-card" aria-label="Portfolio identity card">
      <span class="tiny-avatar"></span>
      <strong>Isaac Wani</strong>
      <span class="divider"></span>
      <span>Graduating IT Innovation &amp; Design Student</span>
      <span class="divider"></span>
      <span>UX · Mobile · Web · Data</span>
    </section>
  </main>

  <dialog class="channel-modal" id="channel-modal" aria-labelledby="modal-title">
    <div class="modal-frame">
      <button class="modal-close" type="button" aria-label="Close channel">×</button>
      <div class="modal-kicker" id="modal-kicker">Channel</div>
      <h1 id="modal-title">About Me</h1>
      <p id="modal-description"></p>
      <div class="modal-tags" id="modal-tags"></div>
      <div class="modal-actions" id="modal-actions"></div>
      <div class="modal-notes" id="modal-notes"></div>
    </div>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
